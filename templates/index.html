<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

<div class="chat-container">

    <div class="header">

        <img src="{{ url_for('static', filename='bot.png') }}" alt="AI Bot">

        <div>
            <h1>Nova AI</h1>
            <p>Your Smart AI Learning Assistant</p>
        </div>

    </div>

    <div class="chat-box" id="chat-box">

        <div class="bot-message">
             Hello! I am Nova AI — your intelligent learning assistant. Ask me anything about AI, Python, NLP, GitHub, Web Development, and more.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="user-input"
            placeholder="Ask something..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

function sendMessage() {

    let userInput = document.getElementById("user-input").value;

    if(userInput.trim() === "") return;

    let chatBox = document.getElementById("chat-box");

    // USER MESSAGE
    let userMessage = document.createElement("div");

    userMessage.className = "user-message";

    userMessage.innerText = userInput;

    chatBox.appendChild(userMessage);

    chatBox.scrollTop = chatBox.scrollHeight;

    // CLEAR INPUT
    document.getElementById("user-input").value = "";

    // TYPING MESSAGE
    let typing = document.createElement("div");

    typing.className = "bot-message";

    typing.innerText = "Nova AI is typing...";

    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/get", {
        method: "POST",

        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },

        body: "message=" + encodeURIComponent(userInput)
    })

    .then(response => response.json())

    .then(data => {

        setTimeout(() => {

            typing.innerText = data.response;

            chatBox.scrollTop = chatBox.scrollHeight;

        }, 1200);

    });

}

// ENTER KEY SUPPORT
document.getElementById("user-input")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){

        sendMessage();
    }
});

</script>

</body>
</html>
